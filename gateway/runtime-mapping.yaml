# 티어 매핑 (모델만)
tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-6"
    HIGH:
      model: "claude-opus-4-6"
    MEDIUM:
      model: "claude-sonnet-4-5"
    LOW:
      model: "claude-haiku-4-5"

# 도구 매핑
tool_mapping:
  web_search:
    - type: mcp
      server: "context7"
      tools: ["resolve-library-id", "query-docs"]

  web_fetch:  # exa는 OMC 제공 MCP 서버 (install.yaml 미포함, 런타임 보장)
    - type: mcp
      server: "exa"
      tools: ["web_search_exa", "get_code_context_exa"]

  code_search:
    - type: lsp
      tools: ["lsp_workspace_symbols"]

# 액션 매핑
action_mapping:
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
