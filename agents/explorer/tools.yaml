# 에이전트가 필요로 하는 도구 선언
# 런타임이 Gateway의 runtime-mapping.yaml을 참조하여 실제 도구에 매핑
tools:
  - name: code_execute
    description: "셸 명령 실행 (git log, gh 명령 등)"
    input: { 명령어 }
    output: { 실행결과 }

  - name: file_read
    description: "파일 내용 읽기"
    input: { 파일경로 }
    output: { 파일내용 }

  - name: code_search
    description: "코드베이스에서 패턴 검색"
    input: { 검색패턴, 검색범위 }
    output: { 매칭결과목록 }
